name: Build & Deploy to EKS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ap-south-1           # Change to your region
  EKS_CLUSTER_NAME: ecommerce-eks  # Change to your cluster name
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  # ─── Build & Push Images ───────────────────────────────────
  build-user-service:
    name: Build user-service (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push user-service
        run: |
          docker build -t $ECR_REGISTRY/user-service:${{ github.sha }} ./user-service
          docker tag $ECR_REGISTRY/user-service:${{ github.sha }} $ECR_REGISTRY/user-service:latest
          docker push $ECR_REGISTRY/user-service:${{ github.sha }}
          docker push $ECR_REGISTRY/user-service:latest

  build-product-service:
    name: Build product-service (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push product-service
        run: |
          docker build -t $ECR_REGISTRY/product-service:${{ github.sha }} ./product-service
          docker tag $ECR_REGISTRY/product-service:${{ github.sha }} $ECR_REGISTRY/product-service:latest
          docker push $ECR_REGISTRY/product-service:${{ github.sha }}
          docker push $ECR_REGISTRY/product-service:latest

  build-order-service:
    name: Build order-service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push order-service
        run: |
          docker build -t $ECR_REGISTRY/order-service:${{ github.sha }} ./order-service
          docker tag $ECR_REGISTRY/order-service:${{ github.sha }} $ECR_REGISTRY/order-service:latest
          docker push $ECR_REGISTRY/order-service:${{ github.sha }}
          docker push $ECR_REGISTRY/order-service:latest

  build-notification-service:
    name: Build notification-service (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push notification-service
        run: |
          docker build -t $ECR_REGISTRY/notification-service:${{ github.sha }} ./notification-service
          docker tag $ECR_REGISTRY/notification-service:${{ github.sha }} $ECR_REGISTRY/notification-service:latest
          docker push $ECR_REGISTRY/notification-service:${{ github.sha }}
          docker push $ECR_REGISTRY/notification-service:latest

  # ─── Deploy to EKS ─────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs:
      - build-user-service
      - build-product-service
      - build-order-service
      - build-notification-service
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Apply namespace
        run: kubectl apply -f eks/namespace/namespace.yaml

      - name: Update image tags and deploy
        run: |
          # Update image references to use the new SHA
          sed -i "s|YOUR_ECR_REGISTRY/user-service:latest|$ECR_REGISTRY/user-service:${{ github.sha }}|g" eks/user-service/deployment.yaml
          sed -i "s|YOUR_ECR_REGISTRY/product-service:latest|$ECR_REGISTRY/product-service:${{ github.sha }}|g" eks/product-service/deployment.yaml
          sed -i "s|YOUR_ECR_REGISTRY/order-service:latest|$ECR_REGISTRY/order-service:${{ github.sha }}|g" eks/order-service/deployment.yaml
          sed -i "s|YOUR_ECR_REGISTRY/notification-service:latest|$ECR_REGISTRY/notification-service:${{ github.sha }}|g" eks/notification-service/deployment.yaml

          kubectl apply -f eks/user-service/deployment.yaml
          kubectl apply -f eks/product-service/deployment.yaml
          kubectl apply -f eks/order-service/deployment.yaml
          kubectl apply -f eks/notification-service/deployment.yaml
          kubectl apply -f eks/ingress/ingress.yaml

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/user-service -n ecommerce --timeout=120s
          kubectl rollout status deployment/product-service -n ecommerce --timeout=180s
          kubectl rollout status deployment/order-service -n ecommerce --timeout=120s
          kubectl rollout status deployment/notification-service -n ecommerce --timeout=120s
